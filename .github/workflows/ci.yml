name: CI

on:
  push:
    branches: [main]
  pull_request:

# One run per branch: a new push cancels the previous, still-running check.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Format, lint, typecheck, build, test
    runs-on: ubuntu-latest
    services:
      # Same image as compose.yaml: integration tests must run against the
      # exact Postgres flavor development uses (dev/prod parity).
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: devflow
          POSTGRES_PASSWORD: devflow_local
          POSTGRES_DB: devflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U devflow -d devflow"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DEVFLOW_DATABASE_URL: postgresql://devflow:devflow_local@127.0.0.1:5432/devflow
    steps:
      # Actions are pinned to full commit SHAs: mutable tags are a supply-chain
      # vector (see the tj-actions/changed-files incident). Dependabot keeps them fresh.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        # pnpm version comes from the packageManager field in package.json

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm verify

      - name: Validate compose file
        run: docker compose config --quiet

  commitlint:
    name: Conventional commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint commit messages
        run: >
          pnpm exec commitlint
          --from ${{ github.event.pull_request.base.sha }}
          --to ${{ github.event.pull_request.head.sha }}
          --verbose

      - name: Lint PR title (becomes the squash commit subject)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: printf '%s' "$PR_TITLE" | pnpm exec commitlint --verbose
