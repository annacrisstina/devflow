name: CI

on:
  push:
    branches: [main]
  pull_request:

# One run per branch: a new push cancels the previous, still-running check.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Format, lint, typecheck, build, test
    runs-on: ubuntu-latest
    services:
      # Same image as compose.yaml: integration tests must run against the
      # exact Postgres flavor development uses (dev/prod parity).
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: devflow
          POSTGRES_PASSWORD: devflow_local
          POSTGRES_DB: devflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U devflow -d devflow"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DEVFLOW_DATABASE_URL: postgresql://devflow:devflow_local@127.0.0.1:5432/devflow
      DEVFLOW_REDIS_URL: redis://127.0.0.1:6379
      # Embedding model cache (ADR-0018): ~25 MB, downloaded once then cached.
      DEVFLOW_AI_MODEL_DIR: /home/runner/.cache/devflow-models
    steps:
      # Actions are pinned to full commit SHAs: mutable tags are a supply-chain
      # vector (see the tj-actions/changed-files incident). Dependabot keeps them fresh.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        # pnpm version comes from the packageManager field in package.json

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      # The embedder tests run the real MiniLM model (fixtures-over-mocks);
      # cache its one-time download so CI stays offline-fast after the first run.
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /home/runner/.cache/devflow-models
          key: devflow-embed-model-Xenova-all-MiniLM-L6-v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm verify

      # Dogfooding (M6): DevFlow ingests its own test results. if: always()
      # is the point — failing runs must upload too, or flake detection has
      # nothing to detect.
      - name: Upload JUnit results for DevFlow ingestion
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: |
            apps/*/test-results/junit.xml
            packages/*/test-results/junit.xml
          if-no-files-found: warn

      - name: Validate compose file
        run: docker compose config --quiet

  commitlint:
    name: Conventional commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      # The embedder tests run the real MiniLM model (fixtures-over-mocks);
      # cache its one-time download so CI stays offline-fast after the first run.
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /home/runner/.cache/devflow-models
          key: devflow-embed-model-Xenova-all-MiniLM-L6-v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint commit messages
        run: >
          pnpm exec commitlint
          --from ${{ github.event.pull_request.base.sha }}
          --to ${{ github.event.pull_request.head.sha }}
          --verbose

      - name: Lint PR title (becomes the squash commit subject)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: printf '%s' "$PR_TITLE" | pnpm exec commitlint --verbose
