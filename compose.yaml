# Two modes, one file (ADR-0020):
#   docker compose up                  -> dev infrastructure only (Postgres,
#     Redis); application code runs natively via `pnpm dev` (D12, unchanged).
#   docker compose --profile full up   -> the whole product in containers:
#     migrate (one-shot) + api (serving the dashboard) + worker. This is the
#     self-hosting path — see docs/self-hosting.md.
# Secrets interpolate from repo-root .env with empty fallbacks so the dev
# path never demands them; the apps' own boot validation is the guard.
name: devflow

services:
  postgres:
    # pgvector-enabled image: the semantic search milestone needs the extension,
    # and swapping images later would invalidate every developer's local volume.
    image: pgvector/pgvector:pg17
    container_name: devflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devflow_local}
      POSTGRES_DB: ${POSTGRES_DB:-devflow}
    ports:
      # Bound to loopback: a dev database must never be reachable from the
      # network, even when this file is reused on a VPS for a demo.
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-devflow} -d ${POSTGRES_DB:-devflow}']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: devflow-redis
    # AOF persistence: queue jobs must survive a container restart in dev,
    # otherwise every restart silently drops in-flight work and hides bugs.
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '127.0.0.1:${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    profiles: ['full']
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: devflow-api
    command: ['node', 'dist/migrate.js']
    environment:
      DEVFLOW_DATABASE_URL: postgresql://${POSTGRES_USER:-devflow}:${POSTGRES_PASSWORD:-devflow_local}@postgres:5432/${POSTGRES_DB:-devflow}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    profiles: ['full']
    image: devflow-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DEVFLOW_DATABASE_URL: postgresql://${POSTGRES_USER:-devflow}:${POSTGRES_PASSWORD:-devflow_local}@postgres:5432/${POSTGRES_DB:-devflow}
      DEVFLOW_REDIS_URL: redis://redis:6379
      DEVFLOW_API_HOST: 0.0.0.0
      DEVFLOW_APP_URL: ${DEVFLOW_APP_URL:-http://127.0.0.1:3001}
      DEVFLOW_TRUST_PROXY: ${DEVFLOW_TRUST_PROXY:-off}
      DEVFLOW_GITHUB_WEBHOOK_SECRET: ${DEVFLOW_GITHUB_WEBHOOK_SECRET:-}
      DEVFLOW_AUTH_SECRET: ${DEVFLOW_AUTH_SECRET:-}
      DEVFLOW_GITHUB_CLIENT_ID: ${DEVFLOW_GITHUB_CLIENT_ID:-}
      DEVFLOW_GITHUB_CLIENT_SECRET: ${DEVFLOW_GITHUB_CLIENT_SECRET:-}
      DEVFLOW_GITHUB_APP_SLUG: ${DEVFLOW_GITHUB_APP_SLUG:-}
      DEVFLOW_AI_API_KEY: ${DEVFLOW_AI_API_KEY:-}
      DEVFLOW_AI_MODEL: ${DEVFLOW_AI_MODEL:-claude-haiku-4-5}
    ports:
      # Loopback by default: put a TLS-terminating proxy in front for real
      # deployments (self-hosting guide) and set DEVFLOW_TRUST_PROXY=on.
      - '${DEVFLOW_API_PUBLISH:-127.0.0.1:3001}:3001'
    healthcheck:
      # curl does not exist in node:22-slim; node's fetch does.
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3001/healthz').then((r)=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    stop_grace_period: 30s

  worker:
    profiles: ['full']
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    image: devflow-worker
    environment:
      DEVFLOW_DATABASE_URL: postgresql://${POSTGRES_USER:-devflow}:${POSTGRES_PASSWORD:-devflow_local}@postgres:5432/${POSTGRES_DB:-devflow}
      DEVFLOW_REDIS_URL: redis://redis:6379
      DEVFLOW_WORKER_HOST: 0.0.0.0
      DEVFLOW_GITHUB_APP_ID: ${DEVFLOW_GITHUB_APP_ID:-}
      DEVFLOW_GITHUB_APP_PRIVATE_KEY_BASE64: ${DEVFLOW_GITHUB_APP_PRIVATE_KEY_BASE64:-}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3002/healthz').then((r)=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    stop_grace_period: 30s

volumes:
  postgres-data:
  redis-data:
