# Local development infrastructure only. Application services run via `pnpm dev`
# so that hot-reload and debugging stay native; only stateful backing services
# live in containers. See docs/conventions.md#development-environment.
name: devflow

services:
  postgres:
    # pgvector-enabled image: the semantic search milestone needs the extension,
    # and swapping images later would invalidate every developer's local volume.
    image: pgvector/pgvector:pg17
    container_name: devflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devflow_local}
      POSTGRES_DB: ${POSTGRES_DB:-devflow}
    ports:
      # Bound to loopback: a dev database must never be reachable from the
      # network, even when this file is reused on a VPS for a demo.
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-devflow} -d ${POSTGRES_DB:-devflow}']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: devflow-redis
    # AOF persistence: queue jobs must survive a container restart in dev,
    # otherwise every restart silently drops in-flight work and hides bugs.
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '127.0.0.1:${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  redis-data:
